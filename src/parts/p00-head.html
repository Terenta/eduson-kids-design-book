<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eduson Kids — дизайн-бук презентаций</title>
<meta name="description" content="Дизайн-система HTML-презентаций Eduson Kids: палитра, типографика, сетка слайда, декор, компоненты и интерактивные блоки.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   EDUSON KIDS · ДИЗАЙН-ТОКЕНЫ
   ============================================================ */
:root{
  --ek-violet:#8C7FF6; --ek-violet-soft:#A79EF9; --ek-violet-deep:#6F61E8; --ek-violet-bg:#F0EEFE;
  --ek-green:#3DF79D; --ek-green-soft:#7BF9BD; --ek-green-mint:#C9F7E3; --ek-green-pale:#E7FDF2; --ek-green-deep:#0FBF6E;
  --ek-ink:#17171C; --ek-gray:#8F8F98; --ek-gray-light:#EFEFF2; --ek-line:#E3E3EA; --ek-white:#fff;
  --ek-red:#FF6B6B; --ek-red-pale:#FFECEC; --ek-bg:#F7F7FB; --ek-radius:28px;
  --ek-font-head:'Inter Tight','Inter','Segoe UI',system-ui,sans-serif;
  --ek-font-body:'Inter','Segoe UI',system-ui,sans-serif;
  --ek-font-mono:'JetBrains Mono','Cascadia Mono','Consolas',monospace;
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--ek-bg);color:var(--ek-ink);font:400 16px/1.6 var(--ek-font-body);-webkit-font-smoothing:antialiased}
img,svg{display:block}
a{color:var(--ek-violet-deep)}

/* ============================================================
   БАЗОВЫЕ КОМПОНЕНТЫ (общие с интерактивными блоками)
   ============================================================ */
.ek-ib{font-family:var(--ek-font-body);color:var(--ek-ink)}
.ek-q{font:800 22px/1.3 var(--ek-font-head);margin:0 0 18px}
.ek-btn{font:700 15px/1 var(--ek-font-head);border:0;border-radius:14px;padding:14px 22px;cursor:pointer;transition:background .15s,transform .1s,opacity .15s}
.ek-btn:active{transform:scale(.97)}
.ek-btn--primary{background:var(--ek-violet);color:#fff}
.ek-btn--primary:hover{background:var(--ek-violet-deep)}
.ek-btn--green{background:var(--ek-green);color:var(--ek-ink)}
.ek-btn--ghost{background:transparent;border:2px solid var(--ek-line);color:var(--ek-ink)}
.ek-btn--ghost:hover{border-color:var(--ek-violet-soft)}
.ek-btn:disabled{opacity:.45;cursor:not-allowed}
.ek-option{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:2px solid var(--ek-line);border-radius:16px;padding:14px 18px;font:600 16px/1.35 var(--ek-font-body);color:var(--ek-ink);cursor:pointer;transition:border-color .15s,background .15s}
.ek-option+.ek-option{margin-top:10px}
.ek-option:hover{border-color:var(--ek-violet-soft)}
.ek-option.is-selected{border-color:var(--ek-violet);background:var(--ek-violet-bg)}
.ek-option.is-correct{border-color:var(--ek-green-deep);background:var(--ek-green-pale)}
.ek-option.is-wrong{border-color:var(--ek-red);background:var(--ek-red-pale)}
.ek-option:disabled{cursor:default}
.ek-chip{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--ek-gray-light);display:flex;align-items:center;justify-content:center;font:800 14px var(--ek-font-head)}
.ek-option.is-correct .ek-chip{background:var(--ek-green)}
.ek-option.is-wrong .ek-chip{background:var(--ek-red);color:#fff}
.ek-feedback{display:none;margin-top:16px;border-radius:14px;padding:14px 18px;font:600 14px/1.5 var(--ek-font-body)}
.ek-feedback.is-on{display:block}
.ek-feedback--ok{background:var(--ek-green-pale);color:#0B7A48}
.ek-feedback--err{background:var(--ek-red-pale);color:#C6403F}
.ek-code{background:#fff;border:2px solid var(--ek-ink);border-radius:14px;padding:18px 22px;font:500 14px/1.65 var(--ek-font-mono);color:var(--ek-ink);overflow-x:auto;white-space:pre;tab-size:4}
.ek-code .c{color:var(--ek-gray)}
.ek-code .k{font-weight:700}
.ek-badge{display:inline-block;background:var(--ek-green);color:var(--ek-ink);font:800 14px/1 var(--ek-font-head);padding:9px 16px;border-radius:10px;transform:rotate(-3deg)}
.ek-badge--violet{background:var(--ek-violet);color:#fff}
.ek-dots{display:flex;gap:8px}
.ek-dots i{width:10px;height:10px;border-radius:50%;background:var(--ek-line)}
.ek-dots i.is-on{background:var(--ek-violet)}
.ek-dots i.is-done{background:var(--ek-green-deep)}

/* ============================================================
   ХРОМ КНИГИ: навигация, секции, карточки
   ============================================================ */
.topnav{position:sticky;top:0;z-index:60;background:rgba(247,247,251,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--ek-line)}
.topnav-in{max-width:1240px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.topnav-logo{display:flex;align-items:center;gap:10px;font:800 16px var(--ek-font-head);white-space:nowrap}
.topnav-logo i{width:26px;height:26px;border-radius:8px;background:var(--ek-violet);display:inline-flex;align-items:center;justify-content:center;color:#fff;font:800 13px var(--ek-font-head);transform:rotate(-6deg)}
.topnav-links{display:flex;gap:6px;flex-wrap:wrap}
.topnav-links a{font:600 12.5px/1 var(--ek-font-body);color:var(--ek-ink);text-decoration:none;padding:8px 11px;border-radius:99px;border:1px solid transparent;transition:.15s}
.topnav-links a:hover{background:var(--ek-violet-bg)}
.topnav-links a.is-active{background:var(--ek-ink);color:#fff}
main{max-width:1240px;margin:0 auto;padding:0 24px 80px}
.book-section{padding-top:72px;scroll-margin-top:80px}
.sec-head{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.sec-num{background:var(--ek-green);color:var(--ek-ink);font:800 15px/1 var(--ek-font-head);padding:9px 14px;border-radius:10px;transform:rotate(-3deg)}
.sec-head h2{margin:0;font:800 34px/1.15 var(--ek-font-head);letter-spacing:-.01em}
.sec-lead{max-width:820px;margin:0 0 28px;color:#4B4B55;font-size:16.5px}
.spec-card{background:#fff;border-radius:24px;padding:30px 34px;box-shadow:0 18px 44px rgba(23,23,28,.06)}
.spec-card h3{margin:0 0 6px;font:800 20px/1.25 var(--ek-font-head)}
.spec-card .sub{margin:0 0 20px;color:var(--ek-gray);font-size:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media (max-width:960px){.grid-3,.grid-4{grid-template-columns:1fr 1fr}}
@media (max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.book-note{margin:22px 0 0;background:var(--ek-violet-bg);border-left:4px solid var(--ek-violet);border-radius:0 16px 16px 0;padding:16px 20px;font-size:14.5px;color:#3C3560}
.book-note b{color:var(--ek-ink)}
.tag{display:inline-block;background:var(--ek-gray-light);color:#55555E;font:600 12px/1 var(--ek-font-mono);padding:6px 10px;border-radius:8px}

/* Копирование */
.copy-btn{border:0;background:var(--ek-gray-light);color:var(--ek-ink);font:600 12px/1 var(--ek-font-mono);padding:7px 11px;border-radius:8px;cursor:pointer;transition:.15s}
.copy-btn:hover{background:var(--ek-violet);color:#fff}
.copy-btn.is-copied{background:var(--ek-green);color:var(--ek-ink)}

/* ============================================================
   ПАЛИТРА
   ============================================================ */
.swatch{border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 12px 30px rgba(23,23,28,.07)}
.swatch-color{height:96px;position:relative}
.swatch-color.is-light{border-bottom:1px solid var(--ek-line)}
.swatch-info{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.swatch-info b{display:block;font:700 14px/1.2 var(--ek-font-head)}
.swatch-info span{display:block;font:500 12px/1.4 var(--ek-font-mono);color:var(--ek-gray)}
.swatch-use{padding:0 16px 14px;margin:-6px 0 0;color:#63636D;font-size:12.5px;line-height:1.45}

/* ============================================================
   ТИПОГРАФИКА
   ============================================================ */
.type-row{display:grid;grid-template-columns:210px 1fr;gap:24px;align-items:baseline;padding:20px 0;border-bottom:1px dashed var(--ek-line)}
.type-row:last-child{border-bottom:0}
.type-meta{font:500 12.5px/1.6 var(--ek-font-mono);color:var(--ek-gray)}
.type-meta b{display:block;font:700 13.5px/1.3 var(--ek-font-head);color:var(--ek-ink);margin-bottom:2px}
@media (max-width:720px){.type-row{grid-template-columns:1fr;gap:6px}}

/* ============================================================
   СЛАЙДЫ 1280×720 (масштабируемые превью)
   ============================================================ */
.slide-frame{position:relative;border-radius:18px;overflow:hidden;box-shadow:0 22px 55px rgba(23,23,28,.13);background:#fff}
.slide-frame .slide{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:0 0;font-family:var(--ek-font-head);overflow:hidden}
.slide-caption{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:14px 4px 0}
.slide-caption b{font:700 15.5px var(--ek-font-head)}
.slide-caption span{font:500 12px var(--ek-font-mono);color:var(--ek-gray)}
.slide--violet{background:var(--ek-violet)}
.slide--green{background:var(--ek-green)}
.slide--white{background:#fff}

/* Декор «Орбита» внутри слайда */
.sl-orbit{position:absolute;inset:0;pointer-events:none}
.slide--violet .sl-orbit{--decor:#A79EF9;--letter:#C4BEFA}
.slide--green .sl-orbit{--decor:#7BF9BD;--letter:#C4FCE0}
.slide--white .sl-orbit{--decor:#97F3C8;--letter:#fff}
.sl-ring{position:absolute;left:50%;top:50%;width:1040px;height:660px;transform:translate(-50%,-50%);border:3px solid var(--decor);border-radius:50%;opacity:.9}
.sl-ico{position:absolute;color:var(--decor)}
.sl-letter{position:absolute;border-radius:50%;background:var(--decor);color:var(--letter);display:flex;align-items:center;justify-content:center;font:800 var(--fs,40px)/1 var(--ek-font-head);font-style:normal}

.sl-waves{position:absolute;right:0;top:0;width:520px;height:720px;pointer-events:none}
.sl-waves svg{width:100%;height:100%}

/* Карточка-окно на слайде */
.sl-card{position:relative;background:#fff;border-radius:28px;box-shadow:0 30px 80px rgba(23,23,28,.16)}
.sl-card-top{display:flex;justify-content:space-between;align-items:center;padding:24px 30px 0}
.sl-dots{display:flex;gap:9px}
.sl-dots i{width:13px;height:13px;border-radius:50%;background:var(--ek-violet)}
.sl-close{position:relative;width:22px;height:22px;opacity:.9}
.sl-close::before,.sl-close::after{content:"";position:absolute;left:-1px;top:9px;width:24px;height:4px;border-radius:2px;background:var(--ek-violet)}
.sl-close::before{transform:rotate(45deg)}
.sl-close::after{transform:rotate(-45deg)}
.sl-badge{display:inline-block;background:var(--ek-green);color:var(--ek-ink);font:800 26px/1 var(--ek-font-head);padding:14px 24px;border-radius:14px;transform:rotate(-4deg);box-shadow:0 10px 24px rgba(23,23,28,.10)}
.sl-h1{font:800 58px/1.12 var(--ek-font-head);letter-spacing:-.015em;margin:0}
.sl-h2{font:800 44px/1.15 var(--ek-font-head);letter-spacing:-.01em;margin:0}
.sl-body{font:500 24px/1.5 var(--ek-font-body)}
.sl-pagenum{position:absolute;right:54px;bottom:38px;font:800 38px/1 var(--ek-font-head);color:#fff}
.slide--white .sl-pagenum{color:var(--ek-ink)}
.sl-codebox{background:#fff;border:2.5px solid var(--ek-ink);border-radius:14px;padding:26px 32px;font:500 21px/1.62 var(--ek-font-mono);white-space:pre;overflow:hidden}
.sl-codebox .c{color:var(--ek-gray)}
.sl-bubble{position:relative;background:#EFEFF1;border-radius:30px;padding:58px 74px;text-align:center}
.sl-bubble::after{content:"";position:absolute;right:56px;bottom:-24px;width:0;height:0;border-left:38px solid transparent;border-top:28px solid #EFEFF1}

/* ============================================================
   СЕКЦИЯ ИНТЕРАКТИВОВ
   ============================================================ */
.ib-item{background:#fff;border-radius:24px;box-shadow:0 18px 44px rgba(23,23,28,.06);overflow:hidden;margin-top:26px}
.ib-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:24px 34px 0}
.ib-head h3{margin:0;font:800 21px/1.2 var(--ek-font-head)}
.ib-desc{padding:6px 34px 0;max-width:860px;color:#4B4B55;font-size:14.5px}
.ib-demo{margin:22px 34px 30px;padding:34px;background:var(--ek-bg);border-radius:18px;display:flex;justify-content:center}
.ib-demo>.ek-ib{width:100%;max-width:680px;background:#fff;border-radius:20px;padding:30px 32px;box-shadow:0 14px 36px rgba(23,23,28,.08)}
@media (max-width:640px){.ib-head,.ib-desc{padding-left:20px;padding-right:20px}.ib-demo{margin:18px 16px 22px;padding:16px}.ib-demo>.ek-ib{padding:22px 18px}}

/* ============================================================
   DO / DON'T
   ============================================================ */
.dd-card{border-radius:20px;padding:22px 26px;background:#fff;box-shadow:0 12px 30px rgba(23,23,28,.06);border-top:5px solid var(--ek-line)}
.dd-card.dd-do{border-top-color:var(--ek-green)}
.dd-card.dd-dont{border-top-color:var(--ek-red)}
.dd-card b{display:flex;align-items:center;gap:8px;font:800 15px var(--ek-font-head);margin-bottom:8px}
.dd-card p{margin:0;font-size:14px;color:#4B4B55}

/* ============================================================
   БИБЛИОТЕКА АССЕТОВ
   ============================================================ */
.asset-card{background:#fff;border-radius:20px;box-shadow:0 12px 30px rgba(23,23,28,.07);overflow:hidden;display:flex;flex-direction:column}
.asset-view{display:flex;align-items:center;justify-content:center;padding:20px;min-height:170px}
.asset-view svg{max-width:100%;height:auto}
.asset-view--dark{background:var(--ek-violet)}
.asset-view--green{background:var(--ek-green)}
.asset-view--dotted{background:var(--ek-bg);background-image:radial-gradient(var(--ek-line) 1.5px,transparent 1.5px);background-size:16px 16px}
.asset-info{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-top:1px solid var(--ek-line)}
.asset-info b{font:700 13.5px var(--ek-font-head)}
.asset-info span{display:block;font:500 11.5px var(--ek-font-mono);color:var(--ek-gray)}

/* Герой */
.hero{position:relative;margin:26px 0 0;border-radius:32px;background:var(--ek-violet);overflow:hidden;padding:88px 24px 96px}
.hero-card{position:relative;z-index:2;max-width:760px;margin:0 auto;background:#fff;border-radius:30px;box-shadow:0 40px 90px rgba(23,23,28,.28);padding:0 0 44px;text-align:center}
.hero-card .sl-card-top{padding:26px 30px 0}
.hero-badge{display:inline-block;background:var(--ek-green);color:var(--ek-ink);font:800 17px/1 var(--ek-font-head);padding:12px 20px;border-radius:12px;transform:rotate(-4deg);margin:4px 0 18px}
.hero h1{margin:0 auto;max-width:600px;font:800 46px/1.12 var(--ek-font-head);letter-spacing:-.015em}
.hero p{max-width:520px;margin:16px auto 0;color:#4B4B55;font-size:16px;padding:0 28px}
.hero-meta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.hero-meta span{background:var(--ek-violet-bg);color:var(--ek-violet-deep);font:700 12.5px/1 var(--ek-font-head);padding:9px 14px;border-radius:99px}
.hero .sl-orbit{--decor:#A79EF9;--letter:#C4BEFA}
@media (max-width:720px){.hero h1{font-size:32px}.hero{padding:64px 16px 72px}}

footer{border-top:1px solid var(--ek-line);margin-top:70px}
.footer-in{max-width:1240px;margin:0 auto;padding:26px 24px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;color:var(--ek-gray);font-size:13px}

/* CSS интерактивных блоков */
/*__COMPONENT_CSS__*/
</style>
</head>
<body>
