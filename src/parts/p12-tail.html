<script>
/* Масштабирование превью слайдов 1280×720 */
(function(){
  'use strict';
  var frames = document.querySelectorAll('.js-scale');
  function fit(fr){
    var slide = fr.querySelector('.slide');
    if(!slide) return;
    var s = fr.clientWidth / 1280;
    slide.style.transform = 'scale(' + s + ')';
    fr.style.height = (720 * s) + 'px';
  }
  if('ResizeObserver' in window){
    var ro = new ResizeObserver(function(entries){ entries.forEach(function(e){ fit(e.target); }); });
    frames.forEach(function(f){ ro.observe(f); fit(f); });
  } else {
    var all = function(){ frames.forEach(fit); };
    window.addEventListener('resize', all); all();
  }
})();

/* Копирование HEX и SVG */
(function(){
  'use strict';
  function done(btn){
    btn.classList.add('is-copied');
    var old = btn.textContent;
    btn.textContent = 'Скопировано';
    setTimeout(function(){ btn.classList.remove('is-copied'); btn.textContent = old; }, 1200);
  }
  function copyText(btn, text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ done(btn); }, function(){ legacy(btn, text); });
    } else { legacy(btn, text); }
  }
  function legacy(btn, text){
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(btn); } catch(e){}
    document.body.removeChild(ta);
  }
  document.addEventListener('click', function(ev){
    var b = ev.target.closest('.copy-btn');
    if(!b) return;
    if(b.dataset.copy){ copyText(b, b.dataset.copy); return; }
    if(b.dataset.svgTarget){
      var el = document.getElementById(b.dataset.svgTarget);
      if(el) copyText(b, el.innerHTML.trim());
    }
  });
})();

/* Подсветка активного раздела в навигации */
(function(){
  'use strict';
  var links = Array.prototype.slice.call(document.querySelectorAll('#navlinks a'));
  if(!links.length) return;
  var map = [];
  links.forEach(function(a){
    var sec = document.getElementById(a.getAttribute('href').slice(1));
    if(sec) map.push([sec, a]);
  });
  var last = null;
  function update(){
    var pos = window.scrollY + window.innerHeight * 0.25;
    var active = null;
    for(var i = 0; i < map.length; i++){
      if(map[i][0].offsetTop <= pos) active = map[i][1];
    }
    if(active === last) return;
    last = active;
    links.forEach(function(a){ a.classList.remove('is-active'); });
    if(active) active.classList.add('is-active');
  }
  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
})();
